<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Omkar AI</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg-base: #0a0a0f;
    --bg-sidebar: #0f0f18;
    --bg-chat: #0a0a0f;
    --bg-input: #13131f;
    --bg-glass: rgba(255,255,255,0.04);
    --bg-glass-hover: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.13);
    --accent: #7c6aff;
    --accent-glow: rgba(124,106,255,0.35);
    --accent-2: #00d4aa;
    --text-primary: #f0f0f8;
    --text-secondary: #8b8ba8;
    --text-muted: #4a4a68;
    --user-msg-bg: linear-gradient(135deg, #7c6aff 0%, #9b59ff 100%);
    --ai-msg-bg: rgba(255,255,255,0.05);
    --scrollbar: rgba(255,255,255,0.06);
    --radius-sm: 10px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --sidebar-w: 270px;
    --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Sora', sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    overflow: hidden;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }

  /* LAYOUT */
  .app {
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
    position: relative;
  }

  .sidebar::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }

  .sidebar-header {
    padding: 22px 18px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .brand-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    box-shadow: 0 0 18px var(--accent-glow);
    flex-shrink: 0;
  }

  .brand-name {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
    background: linear-gradient(135deg, #fff 0%, #a8a0ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .new-chat-btn {
    width: 100%;
    padding: 10px 14px;
    background: var(--bg-glass);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-family: 'Sora', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: var(--transition);
    letter-spacing: 0.1px;
  }

  .new-chat-btn:hover {
    background: var(--bg-glass-hover);
    border-color: var(--border-hover);
    box-shadow: 0 0 16px var(--accent-glow);
  }

  .new-chat-btn svg { opacity: 0.7; flex-shrink: 0; }

  .sidebar-section-label {
    padding: 16px 18px 8px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .chat-history {
    flex: 1;
    overflow-y: auto;
    padding: 0 10px 12px;
  }

  .history-item {
    padding: 9px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: var(--transition);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    position: relative;
    margin-bottom: 2px;
  }

  .history-item:hover {
    background: var(--bg-glass);
    color: var(--text-primary);
  }

  .history-item.active {
    background: var(--bg-glass-hover);
    color: var(--text-primary);
  }

  .history-item svg { flex-shrink: 0; opacity: 0.5; }

  .history-item .item-text {
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .history-item .delete-btn {
    opacity: 0;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 2px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    transition: var(--transition);
    flex-shrink: 0;
  }

  .history-item:hover .delete-btn { opacity: 1; }
  .history-item .delete-btn:hover { color: #ff6b6b; }

  .sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .clear-all-btn {
    width: 100%;
    padding: 9px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-family: 'Sora', sans-serif;
    font-size: 12.5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 7px;
    transition: var(--transition);
  }

  .clear-all-btn:hover {
    color: #ff6b6b;
    border-color: rgba(255,107,107,0.3);
    background: rgba(255,107,107,0.06);
  }

  /* ===== MAIN CHAT ===== */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
    position: relative;
  }

  /* Subtle grid bg */
  .main::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .chat-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(12px);
  }

  .chat-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    background: var(--accent-2);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent-2);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  .header-btn {
    padding: 7px 9px;
    background: var(--bg-glass);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 12px;
    font-family: 'Sora', sans-serif;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: var(--transition);
  }

  .header-btn:hover {
    background: var(--bg-glass-hover);
    color: var(--text-primary);
    border-color: var(--border-hover);
  }

  /* MESSAGES */
  .messages-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    position: relative;
    z-index: 1;
  }

  .message-row {
    display: flex;
    gap: 12px;
    animation: msgIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(16px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .message-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .ai-avatar {
    background: linear-gradient(135deg, var(--accent), #9b59ff);
    box-shadow: 0 0 14px var(--accent-glow);
  }

  .user-avatar {
    background: linear-gradient(135deg, #2a2a3e, #1e1e30);
    border: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
  }

  .message-content {
    max-width: 72%;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .message-row.user .message-content { align-items: flex-end; }

  .bubble {
    padding: 13px 17px;
    border-radius: var(--radius-md);
    font-size: 14.5px;
    line-height: 1.65;
    position: relative;
  }

  .ai-bubble {
    background: var(--ai-msg-bg);
    border: 1px solid var(--border);
    color: var(--text-primary);
    border-radius: 4px var(--radius-md) var(--radius-md) var(--radius-md);
  }

  .user-bubble {
    background: var(--user-msg-bg);
    color: #fff;
    border-radius: var(--radius-md) 4px var(--radius-md) var(--radius-md);
    box-shadow: 0 4px 24px rgba(124,106,255,0.25);
  }

  .bubble p { margin-bottom: 8px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    background: rgba(0,0,0,0.3);
    padding: 2px 6px;
    border-radius: 5px;
    color: var(--accent-2);
  }
  .bubble pre {
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    overflow-x: auto;
    margin: 10px 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.55;
    color: #c8d3f5;
  }
  .bubble pre code { background: none; padding: 0; color: inherit; }

  .msg-meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .msg-time {
    font-size: 11px;
    color: var(--text-muted);
  }

  .copy-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 2px 5px;
    border-radius: 5px;
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 3px;
    transition: var(--transition);
    opacity: 0;
  }

  .message-content:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { color: var(--accent); }
  .copy-btn.copied { color: var(--accent-2); opacity: 1; }

  /* TYPING INDICATOR */
  .typing-row {
    display: flex;
    gap: 12px;
    animation: msgIn 0.3s ease both;
  }

  .typing-bubble {
    background: var(--ai-msg-bg);
    border: 1px solid var(--border);
    border-radius: 4px var(--radius-md) var(--radius-md) var(--radius-md);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .typing-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: typingBounce 1.2s ease infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.15s; background: #9b59ff; }
  .typing-dot:nth-child(3) { animation-delay: 0.3s; background: var(--accent-2); }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* EMPTY STATE */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 12px;
    opacity: 0.35;
    pointer-events: none;
  }

  .empty-state svg { opacity: 0.5; }
  .empty-state p { font-size: 13px; color: var(--text-muted); }

  /* INPUT AREA */
  .input-area {
    padding: 16px 24px 20px;
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }

  .input-wrapper {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 12px 12px 12px 18px;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
  }

  .input-wrapper::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(135deg, var(--accent-glow), transparent 60%);
    opacity: 0;
    transition: var(--transition);
    pointer-events: none;
  }

  .input-wrapper:focus-within {
    border-color: rgba(124,106,255,0.4);
    box-shadow: 0 0 0 3px rgba(124,106,255,0.08), 0 0 30px rgba(124,106,255,0.1);
  }

  .input-wrapper:focus-within::before { opacity: 1; }

  #messageInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-primary);
    font-family: 'Sora', sans-serif;
    font-size: 14.5px;
    line-height: 1.55;
    resize: none;
    max-height: 160px;
    overflow-y: auto;
    padding: 2px 0;
  }

  #messageInput::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 38px;
    height: 38px;
    border-radius: 11px;
    background: linear-gradient(135deg, var(--accent), #9b59ff);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: var(--transition);
    box-shadow: 0 2px 12px var(--accent-glow);
  }

  .send-btn:hover:not(:disabled) {
    transform: scale(1.06);
    box-shadow: 0 4px 20px var(--accent-glow);
  }

  .send-btn:active:not(:disabled) { transform: scale(0.96); }

  .send-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    box-shadow: none;
  }

  .input-hint {
    text-align: center;
    font-size: 11.5px;
    color: var(--text-muted);
    margin-top: 8px;
  }

  /* ERROR TOAST */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(255, 80, 80, 0.15);
    border: 1px solid rgba(255,80,80,0.3);
    color: #ff8080;
    padding: 10px 20px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    backdrop-filter: blur(10px);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 999;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* MOBILE TOGGLE */
  .sidebar-toggle {
    display: none;
    background: var(--bg-glass);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    cursor: pointer;
    padding: 7px;
    align-items: center;
    justify-content: center;
  }

  @media (max-width: 768px) {
    .sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      z-index: 100;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-toggle { display: flex; }
    .main { width: 100%; }
    .message-content { max-width: 85%; }
  }

  /* Highlight code blocks on AI messages */
  .ai-bubble strong { color: #c8d3f5; }
  .ai-bubble em { color: var(--accent); font-style: italic; }
  .ai-bubble ul, .ai-bubble ol { padding-left: 20px; margin: 8px 0; }
  .ai-bubble li { margin-bottom: 4px; }
  .ai-bubble h1, .ai-bubble h2, .ai-bubble h3 {
    margin: 12px 0 6px;
    color: var(--text-primary);
  }

  /* Scrollbar for textarea */
  #messageInput::-webkit-scrollbar { width: 3px; }
  #messageInput::-webkit-scrollbar-thumb { background: var(--scrollbar); }
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-icon">✦</div>
        <span class="brand-name">Omkar AI</span>
      </div>
      <button class="new-chat-btn" onclick="newChat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Chat
      </button>
    </div>

    <div class="sidebar-section-label">Recent Chats</div>

    <div class="chat-history" id="chatHistory"></div>

    <div class="sidebar-footer">
      <button class="clear-all-btn" onclick="clearAllChats()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Clear All Chats
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="chat-header">
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="sidebar-toggle" onclick="toggleSidebar()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="chat-title">
          <div class="status-dot"></div>
          <span id="chatTitleText">New Conversation</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="header-btn" onclick="clearCurrentChat()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
          Clear
        </button>
      </div>
    </div>

    <div class="messages-container" id="messagesContainer"></div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="messageInput"
          placeholder="Ask me anything..."
          rows="1"
          onkeydown="handleKeyDown(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Enter to send · Shift+Enter for new line</p>
    </div>
  </main>

  <div class="toast" id="toast"></div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
let chats = JSON.parse(localStorage.getItem('omkar_chats') || '{}');
let currentChatId = null;
let isTyping = false;

const WELCOME_MSG = {
  role: 'assistant',
  content: "Welcome to Omkar's Personal Chatbot 👋\nAsk me anything — coding, study, productivity, or life.",
  time: now()
};

// ============================================================
// UTILS
// ============================================================
function now() {
  return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

function saveChats() {
  localStorage.setItem('omkar_chats', JSON.stringify(chats));
}

function showToast(msg, duration=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ============================================================
// MARKDOWN-LITE RENDERER
// ============================================================
function renderContent(text) {
  let html = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    // code blocks
    .replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    // inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // bold
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // italic
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // headings
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // bullets
    .replace(/^[\-\*] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
    // numbered
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    // line breaks
    .replace(/\n/g, '<br/>');
  return html;
}

// ============================================================
// RENDER FUNCTIONS
// ============================================================
function renderMessages() {
  const container = document.getElementById('messagesContainer');
  if (!currentChatId || !chats[currentChatId]) {
    container.innerHTML = '';
    return;
  }
  const msgs = chats[currentChatId].messages;
  container.innerHTML = '';
  msgs.forEach((msg, i) => appendMessageToDOM(msg, i));
  scrollToBottom();
}

function appendMessageToDOM(msg, idx) {
  const container = document.getElementById('messagesContainer');
  const isUser = msg.role === 'user';

  const row = document.createElement('div');
  row.className = `message-row ${isUser ? 'user' : 'ai'}`;
  row.dataset.idx = idx;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${isUser ? 'user-avatar' : 'ai-avatar'}`;
  avatar.textContent = isUser ? 'O' : '✦';

  const contentDiv = document.createElement('div');
  contentDiv.className = 'message-content';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${isUser ? 'user-bubble' : 'ai-bubble'}`;
  bubble.innerHTML = isUser
    ? msg.content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br/>')
    : renderContent(msg.content);

  const meta = document.createElement('div');
  meta.className = 'msg-meta';

  const timeEl = document.createElement('span');
  timeEl.className = 'msg-time';
  timeEl.textContent = msg.time || '';

  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
  copyBtn.onclick = () => copyMessage(msg.content, copyBtn);

  meta.appendChild(timeEl);
  meta.appendChild(copyBtn);

  contentDiv.appendChild(bubble);
  contentDiv.appendChild(meta);

  row.appendChild(avatar);
  row.appendChild(contentDiv);
  container.appendChild(row);
}

function scrollToBottom() {
  const c = document.getElementById('messagesContainer');
  c.scrollTop = c.scrollHeight;
}

function showTypingIndicator() {
  const container = document.getElementById('messagesContainer');
  const row = document.createElement('div');
  row.className = 'typing-row';
  row.id = 'typingIndicator';

  const avatar = document.createElement('div');
  avatar.className = 'avatar ai-avatar';
  avatar.textContent = '✦';

  const bubble = document.createElement('div');
  bubble.className = 'typing-bubble';
  bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

  row.appendChild(avatar);
  row.appendChild(bubble);
  container.appendChild(row);
  scrollToBottom();
}

function removeTypingIndicator() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

// ============================================================
// CHAT MANAGEMENT
// ============================================================
function newChat() {
  const id = uid();
  chats[id] = {
    id,
    title: 'New Chat',
    messages: [{ ...WELCOME_MSG }],
    createdAt: Date.now()
  };
  saveChats();
  switchToChat(id);
  renderSidebar();
  closeSidebarOnMobile();
}

function switchToChat(id) {
  currentChatId = id;
  document.getElementById('chatTitleText').textContent = chats[id]?.title || 'Conversation';
  renderMessages();
  renderSidebar();
}

function deleteChat(id, e) {
  e.stopPropagation();
  delete chats[id];
  saveChats();
  if (currentChatId === id) {
    const ids = Object.keys(chats);
    if (ids.length > 0) switchToChat(ids[ids.length - 1]);
    else newChat();
  }
  renderSidebar();
}

function clearCurrentChat() {
  if (!currentChatId) return;
  chats[currentChatId].messages = [{ ...WELCOME_MSG }];
  chats[currentChatId].title = 'New Chat';
  saveChats();
  renderMessages();
  renderSidebar();
  document.getElementById('chatTitleText').textContent = 'New Conversation';
}

function clearAllChats() {
  if (!confirm('Clear all chat history?')) return;
  chats = {};
  saveChats();
  newChat();
}

function renderSidebar() {
  const container = document.getElementById('chatHistory');
  const ids = Object.keys(chats).sort((a,b) => (chats[b].createdAt||0) - (chats[a].createdAt||0));

  if (ids.length === 0) {
    container.innerHTML = '<div style="padding:12px 10px;font-size:12px;color:var(--text-muted);text-align:center;">No chats yet</div>';
    return;
  }

  container.innerHTML = ids.map(id => `
    <div class="history-item ${id === currentChatId ? 'active' : ''}" onclick="switchToChat('${id}')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="item-text">${escHtml(chats[id].title)}</span>
      <button class="delete-btn" onclick="deleteChat('${id}', event)" title="Delete">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  `).join('');
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ============================================================
// SEND MESSAGE
// ============================================================
async function sendMessage() {
  if (isTyping) return;
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  autoResize(input);

  const userMsg = { role: 'user', content: text, time: now() };
  chats[currentChatId].messages.push(userMsg);

  // Update title from first user message
  if (chats[currentChatId].title === 'New Chat') {
    chats[currentChatId].title = text.slice(0, 36) + (text.length > 36 ? '…' : '');
    document.getElementById('chatTitleText').textContent = chats[currentChatId].title;
  }

  saveChats();
  appendMessageToDOM(userMsg, chats[currentChatId].messages.length - 1);
  scrollToBottom();
  renderSidebar();

  // Build history for API (exclude welcome message)
  const history = chats[currentChatId].messages
    .filter(m => !(m.role === 'assistant' && m.content.startsWith("Welcome to Omkar")))
    .slice(0, -1) // exclude the one we just added
    .map(m => ({ role: m.role, content: m.content }));

  isTyping = true;
  document.getElementById('sendBtn').disabled = true;
  showTypingIndicator();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history })
    });

    removeTypingIndicator();

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const aiMsg = { role: 'assistant', content: data.reply, time: now() };
    chats[currentChatId].messages.push(aiMsg);
    saveChats();
    appendMessageToDOM(aiMsg, chats[currentChatId].messages.length - 1);
    scrollToBottom();

  } catch (err) {
    removeTypingIndicator();
    const errMsg = {
      role: 'assistant',
      content: `⚠️ Something went wrong: ${err.message}\n\nMake sure the backend is deployed and your API key is set.`,
      time: now()
    };
    chats[currentChatId].messages.push(errMsg);
    saveChats();
    appendMessageToDOM(errMsg, chats[currentChatId].messages.length - 1);
    scrollToBottom();
    showToast('Error: ' + err.message);
  } finally {
    isTyping = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('messageInput').focus();
  }
}

// ============================================================
// COPY
// ============================================================
function copyMessage(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Copied`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
    }, 2000);
  }).catch(() => showToast('Failed to copy'));
}

// ============================================================
// INPUT HELPERS
// ============================================================
function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function closeSidebarOnMobile() {
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
  }
}

// ============================================================
// INIT
// ============================================================
function init() {
  const ids = Object.keys(chats);
  if (ids.length === 0) {
    newChat();
  } else {
    const latest = ids.sort((a,b) => (chats[b].createdAt||0) - (chats[a].createdAt||0))[0];
    switchToChat(latest);
  }
  document.getElementById('messageInput').focus();
}

init();
</script>
